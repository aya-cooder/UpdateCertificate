<!-- update-kamel.component.html -->
<app-navbar></app-navbar>
<div class="custom-select-content-wrapper">
  <div class="custom-select-form-wrapper">
    
    <h1 class="custom-select-heading">Custom Updates File</h1>
<div class="container" *ngIf="flag">
    <mat-card>
      <mat-card-content class="card-content">
        <h1>Select Excel File <span style="color:#b48339 ;font-weight: bold;"> To Kamel</span> </h1>
        <div class="upload-btn-wrapper">
          <div class="upload-btn-wrapper">
        <input (change)="selectfile($event)" type="file">
        <button (click)="upload()" class="btn">Upload File</button>
        </div>
        </div>
      </mat-card-content>
    </mat-card>
  </div>

<div class="container" *ngIf="!flag">
  <mat-card *ngIf="success" class="success">
    <mat-card-content>
      <h1>Success!</h1>
      <h2>{{ errorMessage }}</h2>
    </mat-card-content>
  </mat-card>

  <mat-card *ngIf="error" class="error">
    <mat-card-content>
      <h1>Error!</h1>
      <h2>{{ errorMessage }}</h2>
    </mat-card-content>
  </mat-card>
</div>
</div>

</div>
